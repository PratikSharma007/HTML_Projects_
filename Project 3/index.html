<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelStud.com - Book your travel to Japan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Book Your Trip to Japan 🇯🇵</h2>
    <form action="">
        <div>
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter Yor Name"> 
        </div>
         <div>
            <label for="age">Age</label>
            <input id="age" type="number" placeholder="Enter Yor Age"> 
        </div>
         <div>
            <label for="phone">Phone No.</label>
            <input id="phone" type="phone" placeholder="Enter Yor Number"> 
        </div>
         <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter Yor Email"> 
        </div>
        <div>
            <label for="add">Address</label>
            <textarea name="Address" id="add"></textarea>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
            
    </form>
    
</body>
</html>
