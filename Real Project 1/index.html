<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato - Order Food From Anywhere</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <!-- Add this video as a background video  -->
        <video autoplay muted loop playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
        <section>
            <!-- Add logo.png  -->
            <div><img src="./logo.png" alt="Zomato logo"></div>
        </section>
        <section>
            <div>
                <h1>India’s #1</h1>
            </div>
            <div>
                <h1>food delivery app</h1>
            </div>
        </section>
        <section>
            <div>
                <p>Experience fast & easy online ordering</p>
            </div>
            <div>
                <p>on the Zomato app</p>
            </div>
        </section>
        <section>
            <img src="./logo2.png" alt="Google Play Logo">
            <img src="./logo3.png" alt="App Store Logo">
        </section>
    </header>

    <main>
        <!-- Add background image in it  -->
        <img src="./bg.png" alt="Background Image">
        <section>
            <div>
                <h1>Better food for</h1>
            </div>
            <div>
                <h1>more people</h1>
            </div>
        </section>
        <section>
            <div>
                <p>For over a decade, we’ve enabled our</p>
            </div>
            <div>
                <p>customers to discover new tastes,</p>
            </div>
            <div>
                <p>delivered right to their doorstep</p>
            </div>
        </section>
        <section>
            <!-- Add images in Midium-Small size in around the text  -->
            <img src="tomoato.png" alt="tomoato image">
            <img src="momo.png" alt="momo image">
            <img src="pizza.png" alt="pizza image">
            <img src="leaf.png" alt="leaf image">
        </section>
    </main>

    <footer>
        Copyright &copy; All right are Proved By PRATIK SHARMA
    </footer>

    <script src="script.js"></script>
</body>

</html>
